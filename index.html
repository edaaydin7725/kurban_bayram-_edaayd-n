    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght=700&family=Montserrat:wght=300;400;600;700&family=Playfair+Display:ital,wght=0,600;0,800;1,400&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #064e3b 0%, #021e17 100%);
            overflow: hidden;
        }
        .serif-font {
            font-family: 'Playfair Display', serif;
        }
        .handwritten-font {
            font-family: 'Caveat', cursive;
        }
        
        /* Arka Plan Yıldız Parlamaları */
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }
        .twinkle-star {
            animation: twinkle 3s infinite ease-in-out;
        }

        /* Koyun Zıplama Animasyonu */
        @keyframes sheep-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(0.95); }
        }
        .animate-sheep {
            animation: sheep-bounce 2.5s infinite ease-in-out;
        }

        /* Koyun Kulak Sallama */
        @keyframes ear-wiggle-left {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-10deg); }
        }
        @keyframes ear-wiggle-right {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }
        .ear-left {
            transform-origin: top right;
            animation: ear-wiggle-left 1.5s infinite ease-in-out;
        }
        .ear-right {
            transform-origin: top left;
            animation: ear-wiggle-right 1.5s infinite ease-in-out;
        }

        /* Giriş Düğmesi Parıltısı */
        @keyframes gold-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(245, 158, 11, 0.4), inset 0 0 10px rgba(245, 158, 11, 0.2); }
            50% { box-shadow: 0 0 35px rgba(245, 158, 11, 0.8), inset 0 0 20px rgba(245, 158, 11, 0.4); }
        }
        .btn-glow {
            animation: gold-glow 2s infinite ease-in-out;
        }

        /* Yürüyen Kuzu Animasyonu (Zamanlayıcı Üzerinde) */
        @keyframes sheep-walk {
            0% { transform: scaleX(1); }
            50% { transform: translateY(-2px); }
            100% { transform: scaleX(1); }
        }
        .walking-sheep {
            animation: sheep-walk 0.4s infinite alternate ease-in-out;
        }

        /* Müzik Butonu Dönüş Animasyonu */
        @keyframes rotate-slow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinning {
            animation: rotate-slow 12s infinite linear;
        }
    </style>
</head>

    <!-- Koyun Sesleri & Fon Müziği Yönetim Scripti -->
    <script>
        let audioCtx = null;
        let isMusicPlaying = false;
        let ambientTimeout = null;

        // Müzik kontrolü (Sakin ve Huzurlu "Bugün Bayram" Sentezleyicisi)
        function toggleMusic() {
            const musicIconOn = document.getElementById('musicIconOn');
            const musicIconOff = document.getElementById('musicIconOff');

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (isMusicPlaying) {
                isMusicPlaying = false;
                musicIconOn.classList.add('hidden');
                musicIconOff.classList.remove('hidden');
                if (ambientTimeout) {
                    clearTimeout(ambientTimeout);
                    ambientTimeout = null;
                }
            } else {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                isMusicPlaying = true;
                musicIconOn.classList.remove('hidden');
                musicIconOff.classList.add('hidden');
                playBugunBayramAmbient();
            }
        }

        // Barış Manço - "Bugün Bayram Erken Kalkın Çocuklar" Melodisinin 
        // Gerçek Zamanlı ve Ultra Sakin/Dinlendirici Müzik Kutusu Tarzında Sentezlenmesi
        function playBugunBayramAmbient() {
            // Nota Frekansları ve Süreleri (Sakin ve masalsı bir tempo için yavaşlatıldı)
            const melody = [
                { f: 440.00, d: 0.7 }, // La4 (Bu-)
                { f: 493.88, d: 0.7 }, // Si4 (-gün)
                { f: 523.25, d: 0.9 }, // Do5 (bay-)
                { f: 523.25, d: 1.4 }, // Do5 (-ram)
                
                { f: 493.88, d: 0.7 }, // Si4 (er-)
                { f: 523.25, d: 0.7 }, // Do5 (-ken)
                { f: 587.33, d: 0.9 }, // Re5 (kal-)
                { f: 587.33, d: 1.4 }, // Re5 (-kın)
                
                { f: 523.25, d: 0.6 }, // Do5 (ço-)
                { f: 493.88, d: 0.6 }, // Si4 (-cuk-)
                { f: 440.00, d: 0.6 }, // La4 (-lar)
                { f: 415.30, d: 0.6 }, // Sol#4 (gi-)
                { f: 440.00, d: 2.8 }  // La4 (-yin)
            ];

            let noteIdx = 0;

            function playNextNote() {
                if (!isMusicPlaying) return;

                const note = melody[noteIdx];
                const now = audioCtx.currentTime;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                // Yumuşak, rüya gibi bir müzik kutusu / tüy tınısı için Saf Sine Wave tercih edildi
                osc.type = 'sine';
                osc.frequency.setValueAtTime(note.f, now);

                // Dijital çınlamayı tamamen kesmek ve kulağı dinlendirmek için yumuşak lowpass filtre
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(550, now);

                // Satie tarzı yavaş vuruş ve uzun sönümlenme süresi (Reverb simülasyonu)
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.09, now + 0.12); // Melodi ses seviyesi biraz daha yükseltildi (0.045 -> 0.09)
                gain.gain.exponentialRampToValueAtTime(0.0001, now + note.d * 1.6);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start(now);
                osc.stop(now + note.d * 1.6);

                // Bir sonraki notaya geçiş süresini hesapla (milisaniye cinsinden)
                const delay = note.d * 850; 
                noteIdx = (noteIdx + 1) % melody.length;

                // Melodi tamamen bittiğinde diğer döngüye geçmeden önce 3.5 saniyelik harika bir "nefes alma/sessizlik" boşluğu bırakır
                const nextDelay = (noteIdx === 0) ? delay + 3500 : delay;

                ambientTimeout = setTimeout(playNextNote, nextDelay);
            }

            playNextNote();
        }

        // Giriş Koyununa Tıklandığında Tetiklenen Zıplama ve Gerçekçi "Mee" Sesi
        function makeSheepJump() {
            const sheep = document.getElementById('introSheep');
            
            sheep.style.animation = 'none';
            sheep.offsetHeight; // Reflow tetikle
            sheep.style.animation = 'sheep-bounce 0.5s ease-in-out';

            playMeeSound();

            setTimeout(() => {
                sheep.style.animation = 'sheep-bounce 2.5s infinite ease-in-out';
            }, 500);
        }

        // Kart İçindeki Küçük Koyun İçin Zıplama
        function makeCardSheepJump() {
            const sheep = document.getElementById('cardSheep');
            sheep.style.transform = 'translateY(-10px) scale(1.05)';
            playMeeSound();
            setTimeout(() => {
                sheep.style.transform = 'translateY(0) scale(1)';
            }, 300);
        }

        // Geliştirilmiş ve Gerçekçi Koyun "Meeee-e-e" Sesi Sentezleyici (LFO ile Vibrato Efekti)
        function playMeeSound() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                const now = audioCtx.currentTime;
                
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const filter = audioCtx.createBiquadFilter();
                const mainGain = audioCtx.createGain();
                
                // Vibrato (Melemedeki titrek kuzu efekti için LFO dalgası)
                const lfo = audioCtx.createOscillator();
                const lfoGain = audioCtx.createGain();
                
                lfo.frequency.value = 11.5; // Koyun melemesi için ideal titreme frekansı (11.5 Hz)
                lfoGain.gain.value = 15;     // Ses frekansı üzerindeki dalgalanma gücü
                
                // Ana ses dalgaları (Hafif genizsel/nazal tını vermesi için sawtooth ve triangle birleşimi)
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(290, now);
                osc1.frequency.exponentialRampToValueAtTime(325, now + 0.12);
                osc1.frequency.exponentialRampToValueAtTime(250, now + 0.65);
                
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(293, now);
                osc2.frequency.exponentialRampToValueAtTime(328, now + 0.12);
                osc2.frequency.exponentialRampToValueAtTime(253, now + 0.65);

                // Bant geçiren filtre ile kuzu sesindeki o burun tınısı (nasal tone) yakalanır
                filter.type = 'bandpass';
                filter.frequency.setValueAtTime(950, now);
                filter.Q.value = 1.3;

                // LFO modülasyonunu osilatörlerin frekanslarına bağlayarak gerçekçi "meee-e" elde etme
                lfo.connect(lfoGain);
                lfoGain.connect(osc1.frequency);
                lfoGain.connect(osc2.frequency);
                
                // Ses şiddeti zarfı (Envelope) - Hızlı yükseliş, titrek düzlük ve yumuşak bitiş
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(0.24, now + 0.04);
                mainGain.gain.setValueAtTime(0.24, now + 0.2);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + 0.75);
                
                osc1.connect(filter);
                osc2.connect(filter);
                filter.connect(mainGain);
                mainGain.connect(audioCtx.destination);
                
                lfo.start(now);
                osc1.start(now);
                osc2.start(now);
                
                lfo.stop(now + 0.75);
                osc1.stop(now + 0.75);
                osc2.stop(now + 0.75);
            } catch (e) {
                console.log("Koyun meleme sesi sentezlenemedi.", e);
            }
        }

        // Konfeti ve Sevgi Efektleri
        function triggerCelebrationEffects() {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 60,
                    origin: { x: 0, y: 0.85 },
                    colors: ['#fbbf24', '#f59e0b', '#ec4899', '#f472b6', '#ffffff']
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 60,
                    origin: { x: 1, y: 0.85 },
                    colors: ['#fbbf24', '#f59e0b', '#ec4899', '#f472b6', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        let countdownInterval;

        // Bayram Kutlamasını Başlatan Ana Fonksiyon (Flowchart Takipçisi)
        function startCelebration() {
            clearInterval(countdownInterval);

            // 1. ADIM: Başlangıç ekranını pürüzsüzce kapat
            const startScreen = document.getElementById('startScreen');
            startScreen.classList.add('scale-50', 'opacity-0');
            setTimeout(() => {
                startScreen.classList.add('hidden');
            }, 500);

            // 2. ADIM: Animasyon / Işık Efektini Başlat
            const lightBurst = document.getElementById('lightBurst');
            lightBurst.classList.remove('scale-0', 'opacity-0');
            lightBurst.classList.add('scale-150', 'opacity-80');
            
            setTimeout(() => {
                lightBurst.classList.remove('scale-150', 'opacity-80');
                lightBurst.classList.add('scale-0', 'opacity-0');
            }, 600);

            const messageCard = document.getElementById('messageCard');
            const actionButtons = document.getElementById('actionButtons');
            const progressBar = document.getElementById('progressBar');
            const progressBarSheep = document.getElementById('progressBarSheep');
            
            // 3. ADIM: Kurban Bayramı Mesajını Göster
            setTimeout(() => {
                messageCard.classList.remove('hidden');
                setTimeout(() => {
                    messageCard.classList.remove('scale-50', 'opacity-0');
                    messageCard.classList.add('scale-100', 'opacity-100');
                    
                    // 4. ADIM: Müzik ve Kutlama Efektini Çalıştır
                    if (!isMusicPlaying) {
                        toggleMusic();
                    }
                    triggerCelebrationEffects();

                    // İlerleme çubuğunu ve kuzu konumunu kur
                    progressBar.style.width = '100%';
                    progressBarSheep.style.left = '100%';
                    actionButtons.classList.add('opacity-0', 'translate-y-4');

                    // 5. ADIM: 5 Saniye Bekle (Zamanlayıcıyı Güncelle)
                    let elapsed = 0;
                    const totalDuration = 5000; // 5 saniye
                    const step = 50; // 50 ms aralıklarla güncelle

                    countdownInterval = setInterval(() => {
                        elapsed += step;
                        let percentage = 100 - (elapsed / totalDuration) * 100;
                        if (percentage < 0) percentage = 0;

                        progressBar.style.width = percentage + '%';
                        progressBarSheep.style.left = percentage + '%';

                        if (elapsed >= totalDuration) {
                            clearInterval(countdownInterval);
                            
                            // 6. ADIM: Mesajı Kapat veya Tekrar Butonunu Göster
                            actionButtons.classList.remove('opacity-0', 'translate-y-4');
                            actionButtons.classList.add('opacity-100', 'translate-y-0');
                        }
                    }, step);

                }, 50);
            }, 400);
        }

        // Kartı Kapatma ve İlk Ekrana Geri Dönme
        function closeCard() {
            const messageCard = document.getElementById('messageCard');
            const startScreen = document.getElementById('startScreen');

            messageCard.classList.remove('scale-100', 'opacity-100');
            messageCard.classList.add('scale-50', 'opacity-0');

            setTimeout(() => {
                messageCard.classList.add('hidden');
                startScreen.classList.remove('hidden');
                setTimeout(() => {
                    startScreen.classList.remove('scale-50', 'opacity-0');
                    startScreen.classList.add('scale-100', 'opacity-100');
                }, 50);
            }, 500);
        }
    </script>
</body>
</html>
